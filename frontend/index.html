<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarot Destiny | พยากรณ์ชะตาชีวิต</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#130b21">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="tarot-data.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mystic: { 900: '#130b21', 800: '#1e1135', gold: '#D4AF37', light: '#f3e8ff' }
                    },
                    fontFamily: { sans: ['Prompt', 'sans-serif'], serif: ['Cinzel', 'serif'] }
                }
            }
        }
    </script>

    <style>
        body { background: radial-gradient(circle at center, #1e1135 0%, #0a0512 100%); color: #f3e8ff; min-height: 100vh; overflow-x: hidden; font-family: 'Prompt', sans-serif; }
        .glass-panel { background: rgba(30, 17, 53, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.2); }
        
        /* 3D Card Flip & Borders (ขอบไพ่สีทอง) */
        .scene { perspective: 1000px; width: 100%; max-width: 240px; aspect-ratio: 2/3; margin: 0 auto; }
        .card-flip { width: 100%; height: 100%; transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; position: relative; }
        .card-flip.is-flipped { transform: rotateY(180deg); }
        .card-face { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            border-radius: 12px; border: 2px solid #D4AF37; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden;
        }
        .card-front { background: url('./images/card-back.jpg') center/cover; }
        .card-back { transform: rotateY(180deg); background: #1e1135; display: flex; align-items: center; justify-content: center; }
        .card-back img { width: 100%; height: 100%; object-fit: cover; object-position: center; background: #fff; }

        /* Progress Bar Animation */
        .progress-ring { transition: stroke-dashoffset 1.5s ease-in-out; transform: rotate(-90deg); transform-origin: 50% 50%; }
        
        .deck-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 8px; }
        .mini-card { aspect-ratio: 2/3; background: url('./images/card-back.jpg') center/cover; border-radius: 4px; border: 1px solid rgba(212, 175, 55, 0.5); cursor: pointer; transition: 0.3s; }
        .mini-card:hover { transform: translateY(-5px) scale(1.1); box-shadow: 0 0 15px rgba(212, 175, 55, 0.8); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade { animation: fadeIn 0.8s ease-out; }
    </style>
</head>
<body class="antialiased">

    <header class="p-4 text-center glass-panel sticky top-0 z-40">
        <h1 class="font-serif text-2xl text-mystic-gold tracking-widest flex items-center justify-center gap-2">
            <i data-lucide="moon-star" class="w-6 h-6"></i> TAROT DESTINY
        </h1>
    </header>

    <main class="container mx-auto px-4 py-6 pb-24">
        
        <section id="screen-setup" class="flex flex-col items-center justify-center min-h-[70vh] animate-fade">
            <div class="glass-panel p-8 rounded-3xl w-full max-w-md text-center shadow-2xl border-t border-mystic-gold/40">
                <i data-lucide="sparkles" class="w-12 h-12 text-mystic-gold mx-auto mb-4"></i>
                <h2 class="font-serif text-2xl text-mystic-gold mb-6">ระบุตัวตนของคุณ</h2>
                
                <p id="error-msg" class="text-red-400 text-sm mb-3 hidden">กรุณาระบุชื่อและราศีให้ครบถ้วน</p>
                
                <input type="text" id="user-name" placeholder="ชื่อของคุณ..." class="w-full bg-mystic-900/80 border border-mystic-gold/30 rounded-xl p-4 mb-4 text-white focus:outline-none focus:border-mystic-gold transition-all">
                
                <select id="user-zodiac" class="w-full bg-mystic-900/80 border border-mystic-gold/30 rounded-xl p-4 mb-8 text-white focus:outline-none">
                    <option value="">เลือกราศีของคุณ...</option>
                    <option value="Capricorn">ราศีมังกร (Capricorn) - 22 ธ.ค. ถึง 19 ม.ค.</option>
                    <option value="Aquarius">ราศีกุมภ์ (Aquarius) - 20 ม.ค. ถึง 18 ก.พ.</option>
                    <option value="Pisces">ราศีมีน (Pisces) - 19 ก.พ. ถึง 20 มี.ค.</option>
                    <option value="Aries">ราศีเมษ (Aries) - 21 มี.ค. ถึง 19 เม.ย.</option>
                    <option value="Taurus">ราศีพฤษภ (Taurus) - 20 เม.ย. ถึง 20 พ.ค.</option>
                    <option value="Gemini">ราศีเมถุน (Gemini) - 21 พ.ค. ถึง 20 มิ.ย.</option>
                    <option value="Cancer">ราศีกรกฎ (Cancer) - 21 มิ.ย. ถึง 22 ก.ค.</option>
                    <option value="Leo">ราศีสิงห์ (Leo) - 23 ก.ค. ถึง 22 ส.ค.</option>
                    <option value="Virgo">ราศีกันย์ (Virgo) - 23 ส.ค. ถึง 22 ก.ย.</option>
                    <option value="Libra">ราศีตุลย์ (Libra) - 23 ก.ย. ถึง 22 ต.ค.</option>
                    <option value="Scorpio">ราศีพิจิก (Scorpio) - 23 ต.ค. ถึง 21 พ.ย.</option>
                    <option value="Sagittarius">ราศีธนู (Sagittarius) - 22 พ.ย. ถึง 21 ธ.ค.</option>
                </select>
                <button onclick="saveProfile()" class="w-full bg-gradient-to-r from-mystic-gold to-yellow-600 text-mystic-900 font-bold py-4 rounded-xl shadow-lg transform active:scale-95 transition text-lg">เข้าสู่ตำหนักพยากรณ์</button>
            </div>
        </section>

        <section id="screen-deck" class="hidden flex-col animate-fade">
            <div class="mb-8 text-center glass-panel p-4 rounded-2xl max-w-sm mx-auto">
                <h2 class="text-xl text-mystic-light">สวัสดี, <span id="display-name" class="text-mystic-gold font-bold"></span></h2>
                <p class="text-sm text-gray-300 mt-1" id="display-zodiac"></p>
            </div>
            <p class="text-center mb-6 text-mystic-gold/90 animate-pulse text-lg">ทำสมาธิ... แล้วเลือกไพ่ที่ดึงดูดใจคุณ 1 ใบ</p>
            <div id="deck-container" class="deck-grid max-w-2xl mx-auto glass-panel rounded-2xl p-6 shadow-inner"></div>
        </section>

        <section id="screen-result" class="hidden flex-col items-center animate-fade">
            <div id="capture-area" class="w-full max-w-xl glass-panel rounded-3xl p-6 md:p-8 relative">
                
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p class="text-mystic-gold text-xs tracking-widest uppercase mb-1" id="res-card-type"></p>
                        <h2 id="res-card-name" class="font-serif text-3xl text-white font-bold">The Card</h2>
                    </div>
                    <div class="relative w-20 h-20 flex-shrink-0">
                        <svg class="w-full h-full" viewBox="0 0 100 100">
                            <circle class="text-gray-800" stroke-width="8" stroke="currentColor" fill="transparent" r="40" cx="50" cy="50"/>
                            <circle id="fortune-circle" class="text-mystic-gold progress-ring" stroke-width="8" stroke-dasharray="251.2" stroke-dashoffset="251.2" stroke-linecap="round" stroke="currentColor" fill="transparent" r="40" cx="50" cy="50"/>
                        </svg>
                        <div class="absolute inset-0 flex flex-col items-center justify-center">
                            <span id="fortune-percent" class="text-lg font-bold text-mystic-gold">0</span>
                            <span class="text-[8px] text-gray-300">ENERGY</span>
                        </div>
                    </div>
                </div>

                <div class="scene mb-8">
                    <div id="result-card-flip" class="card-flip">
                        <div class="card-face card-front"></div>
                        <div class="card-face card-back"><img id="res-card-img" src="" alt="Card" onerror="this.src='./images/card-back.jpg'"></div>
                    </div>
                </div>

                <div class="space-y-4 text-left">
                    <div class="bg-mystic-900/60 p-4 rounded-xl border border-white/10">
                        <h3 class="text-mystic-gold font-semibold mb-2 flex items-center gap-2"><i data-lucide="sparkles" class="w-4 h-4"></i> ความหมายทั่วไป</h3>
                        <p id="res-general" class="text-sm leading-relaxed text-gray-200 min-h-[40px]"></p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-mystic-900/60 p-4 rounded-xl border border-white/10">
                            <h3 class="text-pink-400 font-semibold mb-2 flex items-center gap-2"><i data-lucide="heart" class="w-4 h-4"></i> ความรัก</h3>
                            <p id="res-love" class="text-sm leading-relaxed text-gray-200 min-h-[40px]"></p>
                        </div>
                        <div class="bg-mystic-900/60 p-4 rounded-xl border border-white/10">
                            <h3 class="text-blue-400 font-semibold mb-2 flex items-center gap-2"><i data-lucide="briefcase" class="w-4 h-4"></i> การงานและการเงิน</h3>
                            <p id="res-work" class="text-sm leading-relaxed text-gray-200 min-h-[40px]"></p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 mt-6">
                    <div class="p-3 border border-mystic-gold/30 rounded-lg text-center bg-mystic-800/50">
                        <p class="text-[10px] text-mystic-gold uppercase tracking-wider">สีมงคล</p>
                        <p id="lucky-color" class="font-bold text-sm text-white">-</p>
                    </div>
                    <div class="p-3 border border-mystic-gold/30 rounded-lg text-center bg-mystic-800/50">
                        <p class="text-[10px] text-mystic-gold uppercase tracking-wider">เลขมงคล</p>
                        <p id="lucky-number" class="font-bold text-sm text-white">-</p>
                    </div>
                </div>
            </div>

            <div class="flex gap-4 mt-8 w-full max-w-xl">
                <button onclick="shareResult()" class="flex-1 glass-panel hover:bg-white/10 py-4 rounded-xl flex items-center justify-center gap-2 transition text-sm">
                    <i data-lucide="share-2" class="w-5 h-5"></i> แชร์ผลดวง
                </button>
                <button onclick="newCard()" class="flex-1 bg-gradient-to-r from-mystic-gold to-yellow-600 text-mystic-900 font-bold py-4 rounded-xl shadow-lg transition text-sm">เปิดไพ่ใบใหม่</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 w-full glass-panel border-t border-mystic-gold/20 p-3 flex justify-around rounded-t-2xl z-30">
        <button onclick="goHome()" class="text-mystic-gold flex flex-col items-center transition hover:scale-110">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">หน้าแรก</span>
        </button>
        <button onclick="showHistory()" class="text-gray-400 hover:text-mystic-gold flex flex-col items-center transition hover:scale-110">
            <i data-lucide="book-open" class="w-6 h-6"></i>
            <span class="text-[10px] mt-1">บันทึกชะตา</span>
        </button>
    </nav>

    <div id="history-modal" class="fixed inset-0 bg-black/80 z-50 hidden flex-col justify-end sm:justify-center items-center backdrop-blur-sm transition-opacity">
        <div class="glass-panel w-full sm:w-[400px] max-h-[85vh] rounded-t-3xl sm:rounded-3xl p-6 overflow-y-auto transform translate-y-full transition-transform duration-300" id="history-content">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-serif text-mystic-gold flex items-center gap-2"><i data-lucide="history"></i> บันทึกชะตาของคุณ</h3>
                <button onclick="closeHistory()" class="text-gray-400 hover:text-white bg-white/5 p-2 rounded-full">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-mystic-900/80 p-4 rounded-xl text-center border border-white/5">
                    <p class="text-2xl font-bold text-mystic-gold" id="stat-total">0</p>
                    <p class="text-[10px] text-gray-400 uppercase mt-1">ไพ่ที่เปิดทั้งหมด</p>
                </div>
                <div class="bg-mystic-900/80 p-4 rounded-xl text-center border border-white/5">
                    <p class="text-2xl font-bold text-green-400" id="stat-energy">0%</p>
                    <p class="text-[10px] text-gray-400 uppercase mt-1">พลังงานเฉลี่ย</p>
                </div>
            </div>
            <div id="history-list" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const colors = ["สีแดง (อำนาจ)", "สีทอง (ความรุ่งโรจน์)", "สีน้ำเงิน (ความสงบ)", "สีเขียว (ความสมบูรณ์)", "สีม่วง (ความลึกลับ)", "สีขาว (ความบริสุทธิ์)"];
        let typeWriters = []; 
        let currentUserName = ""; // ตัวแปรเก็บชื่อเพื่อแยก Dashboard

        window.onload = () => {
            lucide.createIcons();
            // หน้าแรกโหลดมา ให้เข้าหน้า Setup เสมอ (ตามที่คุณต้องการคือบังคับกรอกใหม่ตอนรีเฟรชเว็บเอง)
            switchScreen('setup'); 
        };

        function switchScreen(id) {
            document.querySelectorAll('section').forEach(s => {
                s.classList.add('hidden');
                s.classList.remove('flex');
            });
            const activeScreen = document.getElementById('screen-' + id);
            activeScreen.classList.remove('hidden');
            activeScreen.classList.add('flex');
            window.scrollTo(0,0);
            
            // ป้องกันไอคอนหายตอนสลับหน้า
            lucide.createIcons();
        }

        // ฟังก์ชันกลับหน้าแรก
        function goHome() {
            if (currentUserName === "") {
                switchScreen('setup');
            } else {
                switchScreen('deck');
                renderDeck();
            }
        }

        // ฟังก์ชันเปิดไพ่ใบใหม่
        function newCard() {
            switchScreen('deck');
            renderDeck();
        }

        function saveProfile() {
            const name = document.getElementById('user-name').value;
            const zodiacDropdown = document.getElementById('user-zodiac');
            const zodiacValue = zodiacDropdown.value;
            const errorMsg = document.getElementById('error-msg');
            
            if(!name || !zodiacValue) {
                errorMsg.classList.remove('hidden');
                return;
            }
            errorMsg.classList.add('hidden');
            
            currentUserName = name; // บันทึกชื่อเพื่อใช้แยกประวัติ
            const zodiacText = zodiacDropdown.options[zodiacDropdown.selectedIndex].text.split(' - ')[0];
            
            document.getElementById('display-name').textContent = currentUserName;
            document.getElementById('display-zodiac').textContent = zodiacText;
            
            switchScreen('deck');
            renderDeck();
        }

        function renderDeck() {
            const container = document.getElementById('deck-container');
            container.innerHTML = '';
            for(let i=0; i<78; i++) {
                const card = document.createElement('div');
                card.className = 'mini-card';
                card.onclick = drawCard;
                container.appendChild(card);
            }
        }

        async function drawCard() {
    // เช็คว่ามีข้อมูลไพ่จากไฟล์ tarot-data.js ไหม
            if (typeof fullTarotDeck === 'undefined' || fullTarotDeck.length === 0) {
                alert("ไม่พบฐานข้อมูลไพ่ กรุณาตรวจสอบไฟล์ tarot-data.js");
                return;
            }

    // สุ่มจากไพ่ทั้งหมดใน fullTarotDeck
            const result = fullTarotDeck[Math.floor(Math.random() * fullTarotDeck.length)];
            displayResult(result);
        }

        function displayResult(card) {
            switchScreen('result');
            document.getElementById('res-card-name').textContent = card.name;
            document.getElementById('res-card-type').textContent = card.type;
            document.getElementById('res-card-img').src = card.img;
            
            document.getElementById('res-general').innerHTML = '';
            document.getElementById('res-love').innerHTML = '';
            document.getElementById('res-work').innerHTML = '';

            typeWriters.forEach(clearInterval);
            typeWriters = [];
            runTypewriter('res-general', card.general, 30);
            runTypewriter('res-love', card.love, 40);
            runTypewriter('res-work', card.work, 40);

            const baseScore = Math.floor(Math.random() * 30) + 70;
            updateFortuneGauge(baseScore);

            document.getElementById('lucky-number').textContent = Math.floor(Math.random() * 99) + 1;
            document.getElementById('lucky-color').textContent = colors[Math.floor(Math.random() * colors.length)];

            document.getElementById('result-card-flip').classList.remove('is-flipped');
            setTimeout(() => {
                document.getElementById('result-card-flip').classList.add('is-flipped');
            }, 300);

            saveToHistory(card.name, card.img, baseScore);
        }

        function runTypewriter(id, text, speed) {
            const el = document.getElementById(id);
            let i = 0;
            const timer = setInterval(() => {
                if(i < text.length) {
                    el.innerHTML += text.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                }
            }, speed);
            typeWriters.push(timer);
        }

        function updateFortuneGauge(percent) {
            const circle = document.getElementById('fortune-circle');
            const text = document.getElementById('fortune-percent');
            const offset = 251.2 - (percent / 100 * 251.2);
            circle.style.strokeDashoffset = offset;
            
            let start = 0;
            const counter = setInterval(() => {
                start += 2;
                if(start >= percent) {
                    text.textContent = percent + "%";
                    clearInterval(counter);
                } else {
                    text.textContent = Math.floor(start) + "%";
                }
            }, 20);
        }

        function saveToHistory(cardName, cardImg, score) {
            if (!currentUserName) return;
            // แยกประวัติตามชื่อ (ตย. tarot_history_สมชาย)
            const dbKey = 'tarot_history_' + currentUserName;
            let history = JSON.parse(localStorage.getItem(dbKey) || '[]');
            history.unshift({ 
                name: cardName, 
                img: cardImg, 
                score: score, 
                date: new Date().toLocaleDateString('th-TH', {day:'numeric', month:'short', year:'2-digit', hour:'2-digit', minute:'2-digit'}) 
            });
            if(history.length > 20) history.pop();
            localStorage.setItem(dbKey, JSON.stringify(history));
        }

        function showHistory() {
            if (!currentUserName) {
                alert("กรุณาระบุตัวตนเพื่อเข้าสู่ตำหนักพยากรณ์ก่อนครับ");
                return;
            }

            const modal = document.getElementById('history-modal');
            const content = document.getElementById('history-content');
            const list = document.getElementById('history-list');
            
            const dbKey = 'tarot_history_' + currentUserName;
            let history = JSON.parse(localStorage.getItem(dbKey) || '[]');
            
            document.getElementById('stat-total').textContent = history.length;
            if(history.length > 0) {
                const avg = Math.floor(history.reduce((sum, item) => sum + item.score, 0) / history.length);
                document.getElementById('stat-energy').textContent = avg + "%";
            } else {
                document.getElementById('stat-energy').textContent = "0%";
            }

            if (history.length === 0) {
                list.innerHTML = '<p class="text-gray-400 text-center py-8">คุณยังไม่เคยเปิดไพ่พยากรณ์</p>';
            } else {
                list.innerHTML = history.map(item => `
                    <div class="flex items-center gap-4 bg-mystic-800/80 p-3 rounded-xl border border-white/5 shadow-md">
                        <div class="w-10 h-14 rounded overflow-hidden border border-mystic-gold/50 flex-shrink-0">
                            <img src="${item.img}" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-1">
                            <p class="text-mystic-gold font-serif text-sm font-bold">${item.name}</p>
                            <p class="text-[10px] text-gray-400 mt-1">${item.date}</p>
                        </div>
                        <div class="text-right">
                            <span class="bg-mystic-900 text-mystic-gold text-xs px-2 py-1 rounded-full border border-mystic-gold/20 shadow">${item.score}%</span>
                        </div>
                    </div>
                `).join('');
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => content.classList.remove('translate-y-full'), 10);

            // ป้องกันไอคอนประวัติหาย
            lucide.createIcons();
        }

        function closeHistory() {
            const modal = document.getElementById('history-modal');
            const content = document.getElementById('history-content');
            content.classList.add('translate-y-full');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        // ระบบแชร์ที่เสถียรขึ้น (Native Share API สำหรับมือถือ / Copy Text สำหรับคอม)
        async function shareResult() {
            const cardName = document.getElementById('res-card-name').textContent;
            const score = document.getElementById('fortune-percent').textContent;
            const textToShare = `ฉันเปิดไพ่พยากรณ์ Tarot Destiny ได้ไพ่ ${cardName} (พลังงาน ${score})!\nลองมาเปิดไพ่เช็คดวงของคุณดูสิ:`;
            
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Tarot Destiny',
                        text: textToShare,
                        url: window.location.href
                    });
                } catch (err) {
                    console.log("Share cancelled", err);
                }
            } else {
                // รองรับบนคอมพิวเตอร์ที่ไม่มี Share API
                try {
                    await navigator.clipboard.writeText(textToShare + " " + window.location.href);
                    alert("คัดลอกข้อความผลดวงแล้ว! สามารถนำไปกดวาง (Paste) เพื่อแชร์ได้เลยครับ");
                } catch (err) {
