<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tarot Destiny | เปิดไพ่เปลี่ยนชะตา</title>
    
    <!-- PWA Manifest & Theme -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#130b21">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Tailwind CSS & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&family=Cinzel:wght@600&display=swap" rel="stylesheet">
    
    <!-- html2canvas for Sharing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mystic: { 900: '#130b21', 800: '#1e1135', gold: '#D4AF37', light: '#f3e8ff' }
                    },
                    fontFamily: {
                        sans: ['Prompt', 'sans-serif'],
                        serif: ['Cinzel', 'serif']
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background: radial-gradient(circle at center, #1e1135 0%, #0a0512 100%);
            color: #f3e8ff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Glassmorphism */
        .glass-panel {
            background: rgba(30, 17, 53, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        /* 3D Card Flip Magic */
        .scene {
            perspective: 1000px;
            width: 100%;
            max-width: 280px;
            aspect-ratio: 2/3;
            margin: 0 auto;
        }
        .card-flip {
            width: 100%;
            height: 100%;
            transition: transform 1.2s cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-style: preserve-3d;
            position: relative;
            cursor: pointer;
        }
        .card-flip.is-flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .card-front {
            /* ด้านหลังไพ่ (ลายไพ่คว่ำ) */
            background: url('https://upload.wikimedia.org/wikipedia/commons/d/d4/Rider-Waite_Tarot_Card_Backs.jpg') center/cover;
            border: 2px solid #D4AF37;
        }
        .card-back {
            /* ด้านหน้าไพ่ (รูปไพ่ที่หงาย) */
            transform: rotateY(180deg);
            background-color: #1e1135;
            border: 2px solid #D4AF37;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .card-back img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #fff;
        }

        /* Deck Animations */
        .deck-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
            gap: 8px;
            padding: 20px;
        }
        .mini-card {
            aspect-ratio: 2/3;
            background: url('https://upload.wikimedia.org/wikipedia/commons/d/d4/Rider-Waite_Tarot_Card_Backs.jpg') center/cover;
            border-radius: 4px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            cursor: pointer;
            transition: all 0.3s;
        }
        .mini-card:hover {
            transform: translateY(-10px) scale(1.1);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }
        
        .floating { animation: float 6s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* Star particles */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: twinkle 4s infinite linear;
        }
        @keyframes twinkle {
            0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; }
        }
    </style>
</head>
<body class="antialiased">

    <div class="stars"></div>

    <!-- Header -->
    <header class="p-6 text-center glass-panel sticky top-0 z-50">
        <h1 class="font-serif text-3xl md:text-4xl text-mystic-gold tracking-widest flex items-center justify-center gap-3">
            <i data-lucide="moon-star" class="text-mystic-gold"></i>
            Tarot Destiny
            <i data-lucide="sparkles" class="text-mystic-gold"></i>
        </h1>
        <p class="text-sm text-mystic-light/70 mt-2 font-light">สัมผัสไพ่ 1 ใบ เพื่อเปิดประตูดวงชะตาของคุณ</p>
    </header>

    <main class="container mx-auto px-4 py-8 pb-24">
        
        <!-- Screen 1: The Deck (78 Cards) -->
        <section id="screen-deck" class="block animate-fade-in">
            <div class="text-center mb-6">
                <p class="text-lg text-mystic-light animate-pulse">ทำสมาธิ... แล้วเลือกไพ่ที่ดึงดูดคุณที่สุด</p>
            </div>
            <!-- จะถูกสร้างด้วย JS -->
            <div id="deck-container" class="deck-grid max-w-3xl mx-auto glass-panel rounded-2xl p-6"></div>
        </section>

        <!-- Screen 2: Loading / Shuffling -->
        <section id="screen-loading" class="hidden flex-col items-center justify-center min-h-[50vh]">
            <div class="w-16 h-16 border-4 border-mystic-gold border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-mystic-gold font-serif tracking-widest animate-pulse">Connecting to the Universe...</p>
        </section>

        <!-- Screen 3: The Result -->
        <section id="screen-result" class="hidden flex-col items-center">
            
            <div id="capture-area" class="w-full max-w-2xl glass-panel rounded-3xl p-6 md:p-10 relative">
                
                <div class="text-center mb-8">
                    <p class="text-mystic-gold text-sm tracking-widest mb-1">ไพ่แห่งชะตาของคุณ</p>
                    <h2 id="res-card-name" class="font-serif text-3xl text-white">The Fool</h2>
                    <p id="res-card-orientation" class="text-red-400 text-sm mt-1"></p>
                </div>

                <!-- 3D Card Display -->
                <div class="scene mb-10 floating">
                    <div id="result-card-flip" class="card-flip">
                        <div class="card-face card-front"></div>
                        <div class="card-face card-back">
                            <img id="res-card-img" src="" alt="Tarot Card">
                        </div>
                    </div>
                </div>

                <!-- Meanings -->
                <div class="space-y-6 text-left">
                    <div class="bg-mystic-800/50 p-4 rounded-xl border border-mystic-gold/20">
                        <h3 class="text-mystic-gold font-semibold mb-2 flex items-center gap-2">
                            <i data-lucide="book-open" class="w-4 h-4"></i> ความหมายทั่วไป
                        </h3>
                        <p id="res-general" class="text-sm leading-relaxed text-gray-300"></p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-mystic-800/50 p-4 rounded-xl border border-mystic-gold/20">
                            <h3 class="text-pink-400 font-semibold mb-2 flex items-center gap-2">
                                <i data-lucide="heart" class="w-4 h-4"></i> ความรัก
                            </h3>
                            <p id="res-love" class="text-sm leading-relaxed text-gray-300"></p>
                        </div>
                        <div class="bg-mystic-800/50 p-4 rounded-xl border border-mystic-gold/20">
                            <h3 class="text-blue-400 font-semibold mb-2 flex items-center gap-2">
                                <i data-lucide="briefcase" class="w-4 h-4"></i> การงาน/การเงิน
                            </h3>
                            <p id="res-work" class="text-sm leading-relaxed text-gray-300"></p>
                        </div>
                    </div>
                </div>
                
                <!-- Watermark for sharing -->
                <div class="mt-8 text-center opacity-50 text-xs text-mystic-gold hidden" id="watermark">
                    เปิดดวงชะตาที่ Tarot Destiny PWA
                </div>
            </div>

            <!-- Actions -->
            <div class="flex flex-wrap justify-center gap-4 mt-8 w-full max-w-2xl">
                <button onclick="shareResult()" class="flex-1 bg-gradient-to-r from-mystic-gold to-yellow-600 text-mystic-900 font-bold py-3 px-6 rounded-full shadow-lg transform transition hover:scale-105 flex items-center justify-center gap-2">
                    <i data-lucide="share-2" class="w-5 h-5"></i> แชร์คำทำนาย
                </button>
                <button onclick="resetDeck()" class="flex-1 glass-panel text-mystic-gold font-bold py-3 px-6 rounded-full transition hover:bg-white/10 flex items-center justify-center gap-2">
                    <i data-lucide="rotate-ccw" class="w-5 h-5"></i> เปิดไพ่อีกครั้ง
                </button>
            </div>
        </section>

    </main>

    <!-- Bottom Nav (History) -->
    <nav class="fixed bottom-0 w-full glass-panel border-t border-mystic-gold/20 p-4 flex justify-around rounded-t-2xl z-50">
        <button onclick="showDeck()" class="text-mystic-gold flex flex-col items-center">
            <i data-lucide="layers" class="w-6 h-6"></i>
            <span class="text-xs mt-1">สำรับไพ่</span>
        </button>
        <button onclick="showHistory()" class="text-gray-400 hover:text-mystic-gold transition flex flex-col items-center">
            <i data-lucide="history" class="w-6 h-6"></i>
            <span class="text-xs mt-1">ประวัติ</span>
        </button>
    </nav>

    <!-- History Modal -->
    <div id="history-modal" class="fixed inset-0 bg-black/80 z-[60] hidden items-end sm:items-center justify-center">
        <div class="glass-panel w-full sm:w-96 max-h-[80vh] rounded-t-3xl sm:rounded-3xl p-6 overflow-y-auto transform transition-transform translate-y-full sm:translate-y-0" id="history-content">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-serif text-mystic-gold">Reading History</h3>
                <button onclick="closeHistory()" class="text-gray-400 hover:text-white">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <div id="history-list" class="space-y-4">
                <!-- ประวัติจะถูกใส่ที่นี่ -->
            </div>
        </div>
    </div>

    <!-- PWA & Application Logic -->
    <script>
        // Initialize Icons
        lucide.createIcons();

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW setup skipped in preview.'));
            });
        }

        // --- Mock Data Fallback (เพื่อความลื่นไหลใน Free Tier หาก API Cold Start หรือพัง) ---
        const mockCards = [
            { id: "ar00", name: "The Fool", image_url: "https://upload.wikimedia.org/wikipedia/en/9/90/RWS_Tarot_00_Fool.jpg", meanings: { general: "การเริ่มต้นใหม่ ความมีอิสระ การผจญภัยที่ไม่ได้วางแผน", love: "ความรักที่ไร้เดียงสา รักอิสระ ไม่ผูกมัด", work: "โอกาสใหม่ๆ การเสี่ยงเพื่อสิ่งที่ดีกว่า" } },
            { id: "ar01", name: "The Magician", image_url: "https://upload.wikimedia.org/wikipedia/en/d/de/RWS_Tarot_01_Magician.jpg", meanings: { general: "พลังแห่งการเนรมิต ความสามารถ การลงมือทำ", love: "คนมีเสน่ห์ การควบคุมสถานการณ์ได้ดี", work: "ความสำเร็จจากทักษะเฉพาะตัว การริเริ่มโครงการ" } },
            { id: "ar02", name: "The High Priestess", image_url: "https://upload.wikimedia.org/wikipedia/en/8/88/RWS_Tarot_02_High_Priestess.jpg", meanings: { general: "สัญชาตญาณ ความลึกลับ สิ่งที่ซ่อนเร้น", love: "ความรักที่เก็บซ่อนไว้ ความสัมพันธ์ทางใจ", work: "เชื่อมั่นในสัญชาตญาณ งานเบื้องหลัง" } },
            { id: "ar06", name: "The Lovers", image_url: "https://upload.wikimedia.org/wikipedia/en/d/db/RWS_Tarot_06_Lovers.jpg", meanings: { general: "ความรัก ความกลมเกลียว การตัดสินใจเลือก", love: "ความรักที่สมบูรณ์แบบ คู่แท้", work: "การเป็นหุ้นส่วนที่ดี การตัดสินใจที่สำคัญ" } },
            { id: "ar10", name: "Wheel of Fortune", image_url: "https://upload.wikimedia.org/wikipedia/en/3/3c/RWS_Tarot_10_Wheel_of_Fortune.jpg", meanings: { general: "โชคชะตา การเปลี่ยนแปลง วัฏจักรของชีวิต", love: "พรหมลิขิต การเปลี่ยนแปลงในความสัมพันธ์", work: "จังหวะและโอกาสทอง ความก้าวหน้า" } }
        ];

        // --- UI State Management ---
        const screens = {
            deck: document.getElementById('screen-deck'),
            loading: document.getElementById('screen-loading'),
            result: document.getElementById('screen-result')
        };

        function switchScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            screens[screenName].classList.remove('hidden');
            screens[screenName].classList.add('flex');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- Render 78 Cards Deck ---
        const deckContainer = document.getElementById('deck-container');
        for (let i = 0; i < 78; i++) {
            const card = document.createElement('div');
            card.className = 'mini-card';
            card.style.animationDelay = `${Math.random() * 2}s`;
            card.onclick = () => drawCard();
            deckContainer.appendChild(card);
        }

        // --- Core Logic: Draw Card ---
        async function drawCard() {
            switchScreen('loading');
            
            let cardData;
            try {
                // พยายามเรียก Azure Function API
                const response = await fetch('/api/draw');
                if (!response.ok) throw new Error('API Timeout or Not Found');
                cardData = await response.json();
            } catch (error) {
                // Fallback: ใช้ Mock Data แทนเพื่อไม่ให้แอปพัง (Cold Start/Local Test)
                console.warn("Using Local Data. API might be sleeping.", error);
                const randomCard = mockCards[Math.floor(Math.random() * mockCards.length)];
                const isReversed = Math.random() > 0.7; // 30% chance reversed
                cardData = { ...randomCard, isReversed };
            }

            // หน่วงเวลาจำลองความขลัง (ให้ Lottie/Spinner ได้หมุน)
            setTimeout(() => displayResult(cardData), 1500);
        }

        function displayResult(data) {
            switchScreen('result');
            
            const flipEl = document.getElementById('result-card-flip');
            flipEl.classList.remove('is-flipped'); // รีเซ็ตการหมุน
            
            // Set Data
            document.getElementById('res-card-name').textContent = data.name;
            document.getElementById('res-card-orientation').textContent = data.isReversed ? '( กลับหัว / Reversed )' : '';
            
            const imgEl = document.getElementById('res-card-img');
            imgEl.src = data.image_url;
            imgEl.style.transform = data.isReversed ? 'rotate(180deg)' : 'none';

            // Meanings (สลับความหมายถ้ากลับหัวแบบง่ายๆ)
            const prefix = data.isReversed ? "[กลับหัว] " : "";
            document.getElementById('res-general').textContent = prefix + data.meanings.general;
            document.getElementById('res-love').textContent = prefix + data.meanings.love;
            document.getElementById('res-work').textContent = prefix + data.meanings.work;

            // Trigger Flip Animation 
            setTimeout(() => {
                flipEl.classList.add('is-flipped');
            }, 500);

            saveToHistory(data);
        }

        function resetDeck() {
            switchScreen('deck');
            document.getElementById('result-card-flip').classList.remove('is-flipped');
        }

        // --- Share Functionality (Web Share API + html2canvas) ---
        async function shareResult() {
            const captureArea = document.getElementById('capture-area');
            const watermark = document.getElementById('watermark');
            
            try {
                // Show watermark for image
                watermark.classList.remove('hidden');
                
                // สร้างรูปภาพจาก DOM
                const canvas = await html2canvas(captureArea, {
                    backgroundColor: '#130b21',
                    scale: 2 // High Res
                });
                
                watermark.classList.add('hidden');
                const imageBase64 = canvas.toDataURL('image/png');

                // พยายามใช้ Web Share API (สำหรับมือถือ)
                if (navigator.share) {
                    // แปลง base64 เป็น Blob
                    const response = await fetch(imageBase64);
                    const blob = await response.blob();
                    const file = new File([blob], 'tarot-destiny.png', { type: 'image/png' });

                    await navigator.share({
                        title: 'ดวงชะตาของฉันจาก Tarot Destiny',
                        text: 'สัมผัสความขลังและเช็คดวงชะตาวันนี้ได้ที่ Tarot Destiny PWA!',
                        files: [file]
                    });
                } else {
                    // Fallback สำหรับ PC: ดาวน์โหลดรูปภาพ
                    const link = document.createElement('a');
                    link.download = 'tarot-destiny-result.png';
                    link.href = imageBase64;
                    link.click();
                }
            } catch (err) {
                console.error("Share failed", err);
                alert("ไม่สามารถแชร์ได้ในขณะนี้ กรุณาแคปหน้าจอแทนครับ");
                watermark.classList.add('hidden');
            }
        }

        // --- History Management (localStorage) ---
        function saveToHistory(cardData) {
            let history = JSON.parse(localStorage.getItem('tarotHistory') || '[]');
            const record = {
                date: new Date().toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit', hour: '2-digit', minute: '2-digit' }),
                name: cardData.name,
                isReversed: cardData.isReversed,
                image: cardData.image_url
            };
            history.unshift(record);
            if (history.length > 10) history.pop(); // เก็บแค่ 10 ครั้งล่าสุด
            localStorage.setItem('tarotHistory', JSON.stringify(history));
        }

        function showDeck() {
            closeHistory();
            resetDeck();
        }

        function showHistory() {
            const modal = document.getElementById('history-modal');
            const content = document.getElementById('history-content');
            const list = document.getElementById('history-list');
            
            let history = JSON.parse(localStorage.getItem('tarotHistory') || '[]');
            
            if (history.length === 0) {
                list.innerHTML = '<p class="text-gray-400 text-center py-4">ยังไม่มีประวัติการเปิดไพ่</p>';
            } else {
                list.innerHTML = history.map(item => `
                    <div class="flex items-center gap-4 bg-mystic-800/50 p-3 rounded-xl border border-white/5">
                        <img src="${item.image}" class="w-12 h-16 object-cover rounded shadow ${item.isReversed ? 'rotate-180' : ''}">
                        <div>
                            <p class="text-mystic-gold font-serif">${item.name} ${item.isReversed ? '<span class="text-xs text-red-400">(กลับหัว)</span>' : ''}</p>
                            <p class="text-xs text-gray-400">${item.date}</p>
                        </div>
                    </div>
                `).join('');
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                content.classList.remove('translate-y-full');
            }, 10);
        }

        function closeHistory() {
            const modal = document.getElementById('history-modal');
            const content = document.getElementById('history-content');
            content.classList.add('translate-y-full');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }
    </script>
</body>
</html>
